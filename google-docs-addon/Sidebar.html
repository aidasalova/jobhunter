<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <!-- Tailwind CSS CDN for modern UI styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Optional custom styles */
    </style>
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans p-4 m-0 h-screen w-full box-border">
    <div class="flex flex-col h-full space-y-6">
      
      <!-- Header Section -->
      <header class="border-b pb-4">
        <h1 class="text-xl font-bold text-blue-600">One More CV</h1>
        <p class="text-sm text-gray-500">Your AI-powered resume assistant</p>
      </header>

      <!-- Main Content Area -->
      <main class="flex-grow space-y-6 overflow-y-auto pr-2">
        
        <!-- Job Description Input -->
        <section class="bg-white p-4 rounded shadow-sm border border-gray-200">
          <label for="jobDescription" class="block text-sm font-semibold text-gray-800 mb-2">Job Description</label>
          <textarea id="jobDescription" rows="4" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm" placeholder="Paste the job description here..."></textarea>
        </section>

        <!-- Analysis Results Container -->
        <section id="resultsContainer" class="space-y-4">
          <!-- Cards will be injected here -->
        </section>

        <!-- API Settings & Profile Import (Collapsible) -->
        <details class="bg-white p-4 rounded shadow-sm border border-gray-200">
          <summary class="text-md font-semibold cursor-pointer outline-none">Setup & Profile</summary>
          
          <form id="settingsForm" class="space-y-4 mt-4">
            
            <!-- Backup JSON Upload -->
            <div>
              <label for="profileUpload" class="block text-sm font-medium text-gray-700 mb-1">Master Profile (JSON)</label>
              <input type="file" id="profileUpload" accept=".json" class="block w-full text-sm text-gray-500
                file:mr-4 file:py-2 file:px-4
                file:rounded file:border-0
                file:text-sm file:font-semibold
                file:bg-blue-50 file:text-blue-700
                hover:file:bg-blue-100">
            </div>

            <!-- Gemini API Key -->
            <div>
              <label for="apiKey" class="block text-sm font-medium text-gray-700 mb-1">Gemini API Key</label>
              <input type="password" id="apiKey" placeholder="Enter your API Key" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>

            <!-- Save Settings Button -->
            <button id="saveSettingsBtn" type="button" class="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-4 rounded shadow transition duration-150 ease-in-out">
              Save Settings
            </button>

            <!-- Feedback Message Container -->
            <div id="feedbackMsg" class="text-sm hidden text-center rounded py-2 mt-2"></div>

          </form>
        </details>

      </main>

      <!-- Footer Actions -->
      <footer class="pt-4 border-t mt-auto">
        <button id="analyzeBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded shadow transition duration-150 ease-in-out">
          Analyze Document
        </button>
      </footer>

    </div>

    <!-- Client-Side JavaScript -->
    <script>
      document.getElementById('saveSettingsBtn').addEventListener('click', handleSaveSettings);
      document.getElementById('analyzeBtn').addEventListener('click', handleAnalyze);

      function handleAnalyze() {
        const btn = document.getElementById('analyzeBtn');
        const jobDescription = document.getElementById('jobDescription').value.trim();
        const resultsContainer = document.getElementById('resultsContainer');

        if (!jobDescription) {
          alert('Please enter a job description.');
          return;
        }

        btn.textContent = 'Analyzing...';
        btn.disabled = true;
        resultsContainer.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">Analyzing document against job description, please wait...</p>';

        google.script.run
          .withSuccessHandler(function(results) {
            btn.textContent = 'Analyze Document';
            btn.disabled = false;
            renderResults(results);
          })
          .withFailureHandler(function(error) {
            btn.textContent = 'Analyze Document';
            btn.disabled = false;
            resultsContainer.innerHTML = '<p class="text-sm text-red-600 text-center py-4">Error: ' + error.message + '</p>';
          })
          .analyzeWithGemini(jobDescription);
      }

      function renderResults(results) {
        const container = document.getElementById('resultsContainer');
        container.innerHTML = '';

        if (!results || results.length === 0) {
          container.innerHTML = '<p class="text-sm text-gray-500 text-center py-4">No suggestions found or response was empty.</p>';
          return;
        }

        results.forEach((item, index) => {
          const card = document.createElement('div');
          card.className = 'bg-white p-4 rounded shadow-sm border border-gray-200 text-sm space-y-3';
          
          card.innerHTML = `
            <div>
              <p class="font-semibold text-gray-700 mb-1">Original:</p>
              <p class="text-gray-500 line-through">${escapeHtml(item.exact_original_text)}</p>
            </div>
            <div>
              <p class="font-semibold text-green-700 mb-1">Suggested:</p>
              <p class="text-gray-900 font-medium">${escapeHtml(item.suggested_replacement)}</p>
            </div>
            <div class="bg-blue-50 p-2 rounded text-blue-800 text-xs">
              <strong>Reason:</strong> ${escapeHtml(item.reason_for_change)}
            </div>
            <div class="flex space-x-2 pt-2">
              <button class="highlight-btn flex-1 bg-yellow-100 hover:bg-yellow-200 text-yellow-800 font-medium py-1.5 px-2 rounded transition">
                Locate & Highlight
              </button>
              <button class="apply-btn flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-1.5 px-2 rounded transition">
                Apply Edit
              </button>
            </div>
          `;

          const highlightBtn = card.querySelector('.highlight-btn');
          const applyBtn = card.querySelector('.apply-btn');

          highlightBtn.addEventListener('click', () => {
            highlightBtn.textContent = 'Highlighting...';
            google.script.run
              .withSuccessHandler((found) => {
                if (found) {
                  highlightBtn.textContent = 'Highlighted!';
                  highlightBtn.classList.add('bg-yellow-300');
                } else {
                  highlightBtn.textContent = 'Not Found';
                }
                setTimeout(() => {
                  highlightBtn.textContent = 'Locate & Highlight';
                  highlightBtn.classList.remove('bg-yellow-300');
                }, 2000);
              })
              .highlightTextInDoc(item.exact_original_text);
          });

          applyBtn.addEventListener('click', () => {
            applyBtn.textContent = 'Applying...';
            google.script.run
              .withSuccessHandler((replaced) => {
                if (replaced) {
                  applyBtn.textContent = 'Applied';
                  applyBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                  applyBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
                  applyBtn.disabled = true;
                  highlightBtn.disabled = true;
                  highlightBtn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                  applyBtn.textContent = 'Not Found';
                  setTimeout(() => applyBtn.textContent = 'Apply Edit', 2000);
                }
              })
              .replaceTextInDoc(item.exact_original_text, item.suggested_replacement);
          });

          container.appendChild(card);
        });
      }

      function escapeHtml(unsafe) {
        return (unsafe || '').replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function handleSaveSettings() {
        const fileInput = document.getElementById('profileUpload');
        const apiKeyInput = document.getElementById('apiKey');
        const feedbackMsg = document.getElementById('feedbackMsg');
        const btn = document.getElementById('saveSettingsBtn');
        
        const apiKey = apiKeyInput.value.trim();
        const file = fileInput.files[0];

        // Reset feedback
        feedbackMsg.classList.add('hidden');
        feedbackMsg.classList.remove('bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
        
        btn.textContent = 'Saving...';
        btn.disabled = true;

        if (file) {
          // If a file is uploaded, parse it
          const reader = new FileReader();
          reader.onload = function(e) {
            try {
              const data = JSON.parse(e.target.result);
              // Extract the jobhunter_master_profile if it exists, otherwise use the whole object
              const masterProfile = data.jobhunter_master_profile || data;
              sendToBackend({ apiKey, masterProfile });
            } catch (err) {
              showFeedback('Invalid JSON file.', false);
              resetButton(btn);
            }
          };
          reader.onerror = function() {
            showFeedback('Error reading file.', false);
            resetButton(btn);
          };
          reader.readAsText(file);
        } else {
          // If no file is uploaded, just save the API key (and whatever profile is already there, though we pass null/empty to merge on backend later if needed. For now, sending what we have.)
          // Alternatively, alert user to upload file if it's strictly required.
          sendToBackend({ apiKey, masterProfile: null });
        }
      }

      function sendToBackend(payload) {
        google.script.run
          .withSuccessHandler(function(response) {
            showFeedback('Settings saved successfully!', true);
            resetButton(document.getElementById('saveSettingsBtn'));
          })
          .withFailureHandler(function(error) {
            showFeedback('Failed to save: ' + error.message, false);
            resetButton(document.getElementById('saveSettingsBtn'));
          })
          .saveUserSettings(payload);
      }

      function showFeedback(message, isSuccess) {
        const feedbackMsg = document.getElementById('feedbackMsg');
        feedbackMsg.textContent = message;
        feedbackMsg.classList.remove('hidden');
        if (isSuccess) {
          feedbackMsg.classList.add('bg-green-100', 'text-green-800');
        } else {
          feedbackMsg.classList.add('bg-red-100', 'text-red-800');
        }
      }

      function resetButton(btn) {
        btn.textContent = 'Save Settings';
        btn.disabled = false;
      }
    </script>
  </body>
</html>
